name: Deploy to prod

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to prod
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # gnomonitoringv2 is the live Postgres-era project; ~/gnomonitoring is the
            # retired SQLite-era dir (renamed *-legacy-sqlite on the box) — deploying
            # there crashloops the backend with an empty database DSN (2026-07-10).
            cd gnomonitoringv2
            docker compose pull
            docker compose up -d
