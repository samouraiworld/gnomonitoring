services:
  postgres:
    image: postgres:16
    container_name: gnomonitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gnomonitoring
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gnomonitoring
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnomonitoring -d gnomonitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  detect-proposal:
    build: .
    restart: on-failure
    container_name: gnomonitoring-backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config_docker.yaml:/app/config.yaml
    ports:
      - "127.0.0.1:8880:8888"
      - "127.0.0.1:8989:8989"
    command: ["./server"]

volumes:
  pgdata:
