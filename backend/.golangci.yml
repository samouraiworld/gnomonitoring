linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosimple
    - ineffassign
    - unused
    - misspell
    - bodyclose
    - gocritic

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  staticcheck:
    checks: ["all", "-SA1019"]

run:
  timeout: 5m
  tests: true

issues:
  max-same-issues: 5
  exclude-rules:
    - path: "_test.go"
      linters: [errcheck]
    # json.Encode / w.Write in HTTP handlers: error is tied to the TCP connection,
    # there is nothing useful to do if it fails.
    - source: "json\\.NewEncoder\\(w\\)\\.Encode"
      linters: [errcheck]
    - source: "w\\.Write\\("
      linters: [errcheck]
