services:
  postgres:
    image: postgres:16
    container_name: gnomonitoring-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gnomonitoring
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: gnomonitoring
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gnomonitoring -d gnomonitoring"]
      interval: 10s
      timeout: 5s
      retries: 5

  detect-proposal:
    build:
        context: ./backend
    restart: on-failure
    container_name: gnomonitoring-backend
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/config_docker.yaml:/app/config.yaml
    ports:
      - 8880:8888 #metrics
      - 8989:8989 #backend
    command: [ "./server", "--disable-report" ]

  frontend:
      build:
        context: ./panel
      container_name: gnomonitoring-frontend
      ports:
        - "9191:80"
      volumes:
        - ./panel/.env:/app/.env.local
      env_file:
        - ./panel/.env
      restart: unless-stopped

volumes:
  pgdata:
networks:
  default:
  # Local devnet network (gnoland-test/). Must be started first:
  #   cd gnoland-test && docker compose up -d
  # Without it, docker compose up fails because the external network doesn't exist.
  gno-devnet:
    name: gnoland-test_default
    external: true
